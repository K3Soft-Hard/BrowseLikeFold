<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DualView Pro Max</title>
    <style>
        :root {
            --primary: #007AFF;
            --accent: #FF2D55;
            --bg: #0A0A0A;
            --glass: rgba(28, 28, 30, 0.85);
            --border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            /* Allow vertical scrolling on the body if needed, but the iframe handles it */
        }

        /* The Display Engine */
        #viewport {
            position: relative;
            width: 100vw; height: 100vh;
            overflow: hidden;
            z-index: 1; /* Keep website at bottom */
        }

        iframe {
            position: absolute; top: 0;
            width: 200vw; height: 100vh;
            border: none;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            background: white;
            z-index: 1;
        }

        /* Draggable Settings Button */
        #masterToggle {
            position: fixed; 
            bottom: 80px; right: 20px;
            background: var(--primary); color: white;
            border: none; border-radius: 50%;
            width: 56px; height: 56px; 
            z-index: 2000; /* Highest priority */
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            cursor: move;
            touch-action: none;
            pointer-events: auto; /* Always clickable */
        }

        /* Modern Glass UI */
        #controls {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 24px; border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto; /* Clickable */
        }

        #controls.hidden { 
            transform: translate(-50%, 150%); 
            opacity: 0; 
            pointer-events: none; /* Let clicks pass through when hidden */
        }

        #miniScroll {
            position: fixed;
            right: 20px; top: 50%;
            transform: translateY(-50%);
            display: none;
            flex-direction: column;
            gap: 12px;
            z-index: 999;
            background: var(--glass);
            padding: 8px;
            border-radius: 30px;
            border: 1px solid var(--border);
            pointer-events: auto;
        }

        .scroll-pill {
            background: rgba(255,255,255,0.1);
            color: white;
            width: 48px; height: 48px;
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer;
            transition: background 0.2s;
            pointer-events: auto;
        }
        .scroll-pill:active { background: var(--primary); }

        .address-bar {
            display: flex;
            background: rgba(0,0,0,0.4);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }

        input[type="text"] {
            flex: 1; padding: 10px 14px; border: none;
            background: transparent; color: white;
            font-size: 14px; outline: none;
            pointer-events: auto;
        }

        .go-btn {
            background: var(--primary);
            border: none; border-radius: 10px;
            padding: 0 15px; color: white; font-weight: bold;
            pointer-events: auto;
        }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        
        button.side-btn {
            flex: 1; padding: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            color: white; border-radius: 14px;
            font-weight: 600; cursor: pointer;
            pointer-events: auto;
        }

        button.side-btn.active { background: var(--primary); border-color: transparent; }
        
        .slider-container {
            background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 16px; margin-bottom: 20px;
        }

        /* Guide Line - CRITICAL: pointer-events none */
        #guide {
            position: fixed; top: 0; width: 4px; height: 100%;
            background: var(--accent); display: none; z-index: 500;
            pointer-events: none; /* Clicks MUST pass through this */
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="masterToggle">⚙️</div>

    <div id="miniScroll">
        <div class="scroll-pill" onclick="doScroll(-400)">↑</div>
        <div class="scroll-pill" onclick="doScroll(400)">↓</div>
        <div class="scroll-pill" onclick="toggleMainUI()" style="font-size: 14px; font-weight: bold;">UI</div>
    </div>

    <!-- The guide is now set to pointer-events: none so it won't block clicks -->
    <div id="guide"></div>

    <div id="viewport">
        <iframe id="browser" src="about:blank"></iframe>
    </div>

    <div id="controls">
        <div style="text-align: center; margin-bottom: 20px;">
            <h3 style="margin:0; font-size: 18px; letter-spacing: -0.5px;">DualView Browser</h3>
            <div id="statusIndicator" style="font-size: 9px; color: #666; margin-top: 4px;">INTERACTIVE MODE</div>
        </div>

        <div class="btn-group">
            <button id="btnLeft" class="side-btn" onclick="setSide('left')">LEFT SCREEN</button>
            <button id="btnRight" class="side-btn" onclick="setSide('right')">RIGHT SCREEN</button>
        </div>

        <div class="address-bar">
            <input type="text" id="urlInput" placeholder="example.com or http://..." 
                   onkeyup="if(event.key==='Enter') loadUrl(this.value)">
            <button class="go-btn" onclick="loadUrl(document.getElementById('urlInput').value)">GO</button>
        </div>
        
        <div class="slider-container">
            <div class="slider-label" style="display:flex; justify-content:space-between; font-size:12px; color:#bbb; margin-bottom:10px;">
                <span>Bezel Gap Offset</span><b id="bezelVal">0px</b>
            </div>
            <input type="range" min="0" max="250" value="0" style="width:100%; pointer-events:auto;" oninput="updateBezel(this.value)">
        </div>

        <div class="btn-group">
            <button onclick="toggleMiniScroll()" style="font-size: 11px; pointer-events:auto;">MINI PADS</button>
            <button onclick="toggleGuide()" id="guideBtn" style="font-size: 11px; color: var(--accent); pointer-events:auto;">GUIDE</button>
        </div>
    </div>

    <script>
        const frame = document.getElementById('browser');
        const controls = document.getElementById('controls');
        const miniScroll = document.getElementById('miniScroll');
        const guide = document.getElementById('guide');
        const bezelText = document.getElementById('bezelVal');
        const dragBtn = document.getElementById('masterToggle');
        
        let currentSide = 'left';
        let bezelShift = 0;
        let scrollY = 0;

        // Draggable Logic
        let isDragging = false;
        let hasMoved = false;
        let currentX = 0, currentY = 0, initialX, initialY, xOffset = 0, yOffset = 0;

        dragBtn.addEventListener("touchstart", dragStart, {passive: false});
        dragBtn.addEventListener("touchend", dragEnd, {passive: false});
        dragBtn.addEventListener("touchmove", drag, {passive: false});
        dragBtn.addEventListener("mousedown", dragStart);
        document.addEventListener("mouseup", dragEnd);
        document.addEventListener("mousemove", drag);

        function dragStart(e) {
            hasMoved = false;
            if (e.type === "touchstart") {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }
            if (e.target === dragBtn) isDragging = true;
        }

        function dragEnd(e) {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                hasMoved = true;
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }
                xOffset = currentX;
                yOffset = currentY;
                dragBtn.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }

        // Tap vs Drag detection
        dragBtn.addEventListener('click', (e) => {
            if (!hasMoved) toggleMainUI();
        });

        function toggleMainUI() {
            controls.classList.toggle('hidden');
        }

        function toggleMiniScroll() {
            const isVisible = miniScroll.style.display === 'flex';
            miniScroll.style.display = isVisible ? 'none' : 'flex';
            if(!isVisible) controls.classList.add('hidden');
        }

        function loadUrl(url) {
            if(!url) return;
            if(!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            frame.src = url;
            document.getElementById('statusIndicator').innerText = "LINKED: " + (url.startsWith('http://') ? '🔓 ' : '🔒 ') + url.split('//')[1].substring(0,15);
            document.getElementById('urlInput').value = url;
        }

        function setSide(side) {
            currentSide = side;
            document.getElementById('btnLeft').classList.toggle('active', side === 'left');
            document.getElementById('btnRight').classList.toggle('active', side === 'right');
            
            if(side === 'left') {
                guide.style.left = 'auto'; guide.style.right = '0';
            } else {
                guide.style.left = '0'; guide.style.right = 'auto';
            }
            updateTransform();
        }

        function updateBezel(val) {
            bezelShift = parseInt(val);
            bezelText.innerText = val + 'px';
            updateTransform();
        }

        function updateTransform() {
            if (currentSide === 'left') {
                frame.style.transform = `translateX(0px)`;
            } else {
                frame.style.transform = `translateX(calc(-100vw + ${bezelShift}px))`;
            }
        }

        function toggleGuide() {
            const isVisible = guide.style.display === 'block';
            guide.style.display = isVisible ? 'none' : 'block';
            document.getElementById('guideBtn').style.background = isVisible ? 'rgba(255,255,255,0.08)' : 'var(--accent)';
        }

        function doScroll(offset) {
            scrollY += offset;
            if(scrollY < 0) scrollY = 0;
            try {
                // This scrolls the window inside the iframe
                frame.contentWindow.scrollTo(0, scrollY);
            } catch(e) {
                // Browsers block this for different domains. 
                // The status indicator helps debug.
                document.getElementById('statusIndicator').innerText = "SYNC BLOCKED - USE WEBVIEW APP";
            }
        }
    </script>
</body>
</html>
